[main]
# Fonte e tamanho (Usando a sua JetBrains)
font=JetBrainsMono Nerd Font:size=18
dpi-aware=no

# Ícone que aparece antes de digitar (um prompt de terminal/busca)
prompt="󰍉 "
placeholder="Hack the planet..."

# Ajustes de Janela
width=40
tabs=4
horizontal-pad=20
vertical-pad=15
inner-pad=10

# Qual terminal ele deve usar para rodar apps de terminal (Como você tem o kitty)
terminal=kitty

[colors]
# Formato: RRGGBBAA (Vermelho, Verde, Azul, Alpha/Opacidade)
background=0a100ef0       # Escuro das sombras (com 94% de opacidade)
text=528a7eff             # Verde acinzentado (texto normal)
match=00ff9dff            # Verde neon brilhante (letras que batem com a busca)
selection=1f4d42ff        # Verde escuro (fundo do item selecionado)
selection-text=00ff9dff   # Texto selecionado em destaque
selection-match=10f3a5ff  # Match selecionado
border=10f3a5ff           # Borda verde neon

[border]
width=2
radius=10

[dmenu]
mode=text
